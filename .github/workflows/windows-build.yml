name: Build Windows app

on:
  push:
    branches:
      - main
    paths:
      - "windows/**"
      - ".github/workflows/windows-build.yml"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build NSIS installer
        shell: bash
        run: |
          set +e
          npm run dist 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::electron-builder output (tail)"
            tail -60 build.log
            echo "::endgroup::"
            tail -12 build.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done
          fi
          exit "$code"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Windows code signing: add repo secrets WINDOWS_CERT_BASE64
          # (base64 of a .pfx) and WINDOWS_CERT_PASSWORD to sign automatically.
          # When unset, electron-builder produces an unsigned installer.
          CSC_LINK: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipartBrowser-Windows
          path: windows/dist/*.exe
          if-no-files-found: error

      # On a version tag (vX.Y.Z), attach the installer to a GitHub Release.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/*.exe
          name: ClipartBrowser ${{ github.ref_name }} (Windows)
          generate_release_notes: true
          body: |
            Windows 10+ installer for ClipartBrowser (Electron edition).

            **Install:** download the `.exe` below and run it. It is unsigned, so
            Windows SmartScreen may warn — choose **More info → Run anyway**.
