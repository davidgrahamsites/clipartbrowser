name: Build Windows app

on:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build NSIS installer
        shell: bash
        run: |
          set +e
          npm run dist 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::electron-builder output (tail)"
            tail -60 build.log
            echo "::endgroup::"
            tail -12 build.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done
          fi
          exit "$code"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipartBrowser-Windows
          path: windows/dist/*.exe
          if-no-files-found: error
