<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: data: blob:; worker-src 'self' blob:"
    />
    <title>剪贴画浏览器</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100vh; }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        color: #1f2937;
        font-size: 13px;
      }
      button { font: inherit; padding: 5px 10px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; }
      button:hover:not(:disabled) { background: #f3f4f6; }
      button:disabled { opacity: 0.45; cursor: default; }
      button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
      input[type="text"], input[type="number"] { font: inherit; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 6px; }
      select { font: inherit; padding: 4px 6px; border-radius: 6px; }
      .bar { display: flex; gap: 10px; align-items: center; padding: 8px 12px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
      .seg { display: inline-flex; border: 1px solid #d1d5db; border-radius: 6px; overflow: hidden; }
      .seg button { border: none; border-radius: 0; padding: 4px 10px; }
      .seg button.on { background: #2563eb; color: #fff; }
      .spacer { flex: 1; }
      .muted { color: #6b7280; }

      #body { flex: 1; display: flex; min-height: 0; }
      #words { width: 300px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; min-height: 0; }
      #words .head { padding: 10px 12px; }
      #words h2 { margin: 0 0 2px; font-size: 16px; }
      #wordAdd { display: flex; gap: 6px; padding: 0 12px 8px; }
      #wordAdd input { flex: 1; }
      #wordList { flex: 1; overflow-y: auto; padding: 0 6px 10px; }
      .word { display: flex; gap: 8px; align-items: center; padding: 6px 8px; border-bottom: 1px solid #f3f4f6; }
      .word .term { font-weight: 500; }
      .word .ln { font-size: 11px; color: #9ca3af; }

      #right { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      #browser-pane { display: none; flex-direction: column; min-height: 0; flex: 1.1; border-bottom: 1px solid #e5e7eb; }
      #browser-pane.active { display: flex; }
      #browser-bar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-bottom: 1px solid #e5e7eb; }
      #tabs { flex: 1; display: flex; gap: 6px; overflow-x: auto; }
      #tabs .tab { padding: 4px 10px; border-radius: 999px; white-space: nowrap; cursor: pointer; color: #6b7280; }
      #tabs .tab.on { background: #e5e7eb; color: #111827; }
      webview { flex: 1; }

      #cards-pane { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      #cards-head { padding: 10px 14px; }
      #cards-head h2 { margin: 0; font-size: 16px; }
      #cards { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; padding: 14px; align-content: start; }
      .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; background: #fff; position: relative; }
      .card.sel { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
      .card .imgwrap { background: #fff; border: 1px solid #f3f4f6; border-radius: 6px; aspect-ratio: 8.5 / 11; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .card.land .imgwrap { aspect-ratio: 11 / 8.5; }
      .card .imgwrap img { max-width: 100%; max-height: 100%; padding: 8px; }
      .card .w { font-weight: 600; margin-top: 6px; }
      .card .dims { font-size: 11px; color: #9ca3af; }
      .card .x { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 999px; padding: 0; line-height: 1; }
      .card .retry { position: absolute; top: 6px; left: 6px; width: 24px; height: 24px; border-radius: 999px; padding: 0; line-height: 1; }
      .empty { color: #9ca3af; text-align: center; margin: auto; padding: 30px; }

      #status { padding: 6px 12px; border-top: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280; display: flex; gap: 8px; align-items: center; }
    </style>
  </head>
  <body>
    <div class="bar">
      <button id="importBtn">📄 导入</button>
      <button id="pickBtn">🖼 选择图片</button>
      <button id="pptxBtn">⬆ 导出 PPTX</button>
      <button id="listBtn">≣ 导出清单</button>
      <div class="spacer"></div>
      <span class="muted">文件名</span>
      <input id="fileName" type="text" value="词汇卡片" style="width: 220px" />
      <input id="fileInput" type="file" accept=".docx,.pdf,.rtf,.txt,.png,.jpg,.jpeg,.gif,.bmp,.tif,.tiff,.webp,.heic,.heif" style="display: none" />
    </div>

    <div class="bar">
      <span class="muted">边距</span>
      <input id="padding" type="range" min="0" max="72" step="1" value="12" />
      <input id="paddingNum" type="number" min="0" max="72" value="12" style="width: 56px" /><span class="muted">像素</span>
      <div class="seg" id="orientation">
        <button data-v="portrait" class="on">纵向</button>
        <button data-v="landscape">横向</button>
      </div>
      <span class="muted">标签</span>
      <div class="seg" id="labels">
        <button data-v="show" class="on">显示</button>
        <button data-v="hide">隐藏</button>
      </div>
      <span class="muted">放大方式</span>
      <select id="upscaler">
        <option value="coreImage">最清晰</option>
        <option value="coreGraphics">平衡</option>
        <option value="vImage">最快</option>
        <option value="appKit">最平滑</option>
      </select>
    </div>

    <div id="body">
      <div id="words">
        <div class="head">
          <h2>词语</h2>
          <div class="muted" id="docName">导入文档以查找词汇。</div>
        </div>
        <div id="wordAdd">
          <input id="termInput" type="text" placeholder="添加搜索词" />
          <button id="addTermBtn">＋</button>
        </div>
        <div id="wordList"></div>
      </div>

      <div id="right">
        <div id="browser-pane">
          <div id="browser-bar">
            <button id="prevTab" title="上一个">‹</button>
            <div id="tabs"></div>
            <button id="nextTab" title="下一个">›</button>
            <select id="engine" title="搜索引擎"></select>
            <button id="zoomOut" title="显示更多图片">－</button>
            <span id="zoomPct" class="muted" style="width: 38px; text-align: center">60%</span>
            <button id="zoomIn" title="显示更少更大的图片">＋</button>
            <button id="reloadBtn" title="刷新">⟳</button>
            <button id="closeBrowser" title="关闭">✕</button>
          </div>
          <webview id="webview" allowpopups></webview>
        </div>

        <div id="cards-pane">
          <div id="cards-head" style="display: flex; align-items: center; gap: 10px">
            <div><h2>卡片</h2><div class="muted" id="cardsSub"></div></div>
            <div class="spacer"></div>
            <button id="compareBtn" disabled title="为所选卡片比较放大方式">比较放大方式</button>
          </div>
          <div id="cards"><div class="empty">审阅词语后选择图片。</div></div>
        </div>
      </div>
    </div>

    <div id="preview-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center">
      <div style="background: #fff; width: 90%; height: 88%; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden">
        <div class="bar" style="border-bottom: 1px solid #e5e7eb">
          <strong>放大预览</strong>
          <span class="muted" id="previewWord"></span>
          <div class="spacer"></div>
          <span class="muted">缩放</span>
          <select id="previewZoom">
            <option value="fit">适应</option>
            <option value="1">100%</option>
            <option value="2">200%</option>
            <option value="4">400%</option>
          </select>
          <button id="previewClose">关闭</button>
        </div>
        <div id="previewGrid" style="flex: 1; overflow: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; padding: 16px; align-content: start"></div>
      </div>
    </div>

    <div id="status"><span id="statusText">导入文档以查找词汇。</span></div>

    <script src="renderer.js"></script>
  </body>
</html>
